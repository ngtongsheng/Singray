name: Release

on:
  push:
    branches: [main]

# Don't let two pushes race on the same release.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Hold all releases (incl. v1.0) until the Round 5 milestone closes. Once it
  # does, this is permanently a no-op pass-through — every push releases again
  # as normal from v1.0 onward.
  gate:
    name: Gate on Round 5 milestone
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state=$(gh api "repos/${{ github.repository }}/milestones?state=all" --jq '.[] | select(.title=="Round 5") | .state')
          if [ "$state" = "open" ]; then
            echo "Round 5 milestone still open — holding releases until it closes."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # release-please opens/maintains a release-PR (version bump + CHANGELOG from
  # Conventional Commits). Merging that PR cuts the tag + GitHub Release; only
  # then do the build jobs run and attach installers.
  release-please:
    name: Release-please
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build + attach Windows installer
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # build:win = npm run build (check + electron-vite) && electron-builder --win.
      # --publish never: release-please owns the Release; we only upload to it.
      - run: npm run build:win -- --publish never
      - shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem dist -Filter *-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "No NSIS installer found in dist/" }
          gh release upload "${{ needs.release-please.outputs.tag_name }}" $exe.FullName --clobber

  # macOS build (R5.2): community-tested, unsigned .dmg uploaded to the same Release.
  build-mac:
    name: Build + attach macOS dmg (community-tested, unsigned)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Unsigned: electron-builder.yml sets notarize:false / no signing identity.
      - run: npm run build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          dmg=$(ls dist/*.dmg | head -n1)
          [ -n "$dmg" ] || { echo "No .dmg found in dist/"; exit 1; }
          gh release upload "$tag" "$dmg" --clobber
