# build/ vs resources/ — both exist on purpose, not a duplication:
#   build/     = package-time assets electron-builder consumes when making the
#                installer (icon.ico/.icns, entitlements.mac.plist). Pointed to
#                by directories.buildResources below; never shipped into the app.
#   resources/ = runtime-bundled assets, kept out of the asar (asarUnpack below)
#                so they're real files on disk. main/index.ts imports
#                resources/icon.png?asset for the BrowserWindow icon.
# Same source image (icon.png), two different lifecycle stages.
appId: com.singray.app
productName: Singray
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!pipeline/.venv'
  - '!pipeline/.gitignore'
  - '!pipeline/ruff.toml'
  - '!pipeline/setup.{ps1,sh}'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{biome.json,dev-app-update.yml,CHANGELOG.md,README.md,SPEC.md,CLAUDE.md}'
  - '!docs/**'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  # pipeline.py is spawned as a real file by an external Python process — asar
  # archives are a single file, so a path *through* one is unreachable to it (#132).
  - pipeline/**
win:
  executableName: singray
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
# We don't sign with an Apple cert, but electron-builder leaves the app's seal
# broken when signing is skipped — on Apple Silicon that makes a quarantined
# download fail to launch as "damaged" (#125). afterPack re-signs ad-hoc so the
# bundle is structurally valid; still unsigned as far as Gatekeeper is concerned.
afterPack: build/afterPack.cjs
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
