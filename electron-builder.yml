# build/ vs resources/ — both exist on purpose, not a duplication:
#   build/     = package-time assets electron-builder consumes when making the
#                installer (icon.ico/.icns, entitlements.mac.plist). Pointed to
#                by directories.buildResources below; never shipped into the app.
#   resources/ = runtime-bundled assets, kept out of the asar (asarUnpack below)
#                so they're real files on disk. main/index.ts imports
#                resources/icon.png?asset for the BrowserWindow icon.
# Same source image (icon.png), two different lifecycle stages.
appId: com.singray.app
productName: Singray
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!pipeline/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{biome.json,dev-app-update.yml,CHANGELOG.md,README.md,SPEC.md,CLAUDE.md}'
  - '!docs/**'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: singray
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
